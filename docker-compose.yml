services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shop}
      POSTGRES_USER: ${POSTGRES_USER:-shop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shop}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shop} -d ${POSTGRES_DB:-shop}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-shop}:${POSTGRES_PASSWORD:-shop}@db:5432/${POSTGRES_DB:-shop}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      BOT_INTERNAL_URL: http://bot:8081/internal/order-notification
      BOT_INTERNAL_SECRET: ${BOT_INTERNAL_SECRET:-change-me-internal-secret}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  bot:
    build:
      context: ./bot
    environment:
      BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      MINI_APP_URL: ${MINI_APP_URL:-http://localhost:3000}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID:-}
      BOT_INTERNAL_SECRET: ${BOT_INTERNAL_SECRET:-change-me-internal-secret}
      BOT_INTERNAL_HOST: 0.0.0.0
      BOT_INTERNAL_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
        NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME:-}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
